<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- <link rel="stylesheet" href="/src/style.css" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <body class="bg-pink-50 min-h-screen flex items-center justify-center">
    <main class="bg-white p-8 rounded-lg shadow-lg w-full max-w-sm text-center">
      <h1 class="text-6xl font-bold text-pink-600">🎉 Det fungerer!</h1>
      <h1 class="text-2xl font-bold mb-6 text-pink-600">Login</h1>
      <form action="/profile/index.html" method="POST" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700"
            >E-post</label
          >
          <input
            id="email"
            name="email"
            type="email"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-pink-500"
          />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700"
            >Passord</label
          >
          <input
            id="password"
            name="password"
            type="password"
            minlength="8"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-pink-500"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-pink-600 text-white py-2 rounded-md hover:bg-pink-700 transition"
        >
          Send
        </button>
      </form>
    </main>
  </body>
</html>
