<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="/css/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <body class="bg-pink-50 min-h-screen flex items-center justify-center">
    <main class="bg-white p-8 rounded-lg shadow-lg w-full max-w-sm md:max-w-md lg:max-w-lg xl:max-w-xl 2xl:max-w-2xl md:p-12 xl:p-16">
      <h1 class="text-5xl font-bold mb-6 text-pink-600 text-center">Login</h1>
      <form
        action="/profile/index.html"
        method="POST"
        class="space-y-6"
      >
        <div class="flex flex-col gap-1">
          <label for="email" class="text-sm font-medium text-gray-700 mb-1"
            >E-post</label
          >
          <input
            id="email"
            name="email"
            type="email"
            required
            class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-pink-500"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label for="password" class="text-sm font-medium text-gray-700 mb-1"
            >Passord</label
          >
          <input
            id="password"
            name="password"
            type="password"
            minlength="8"
            required
            class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-pink-500"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-pink-600 text-white py-3 px-6 text-lg rounded-md hover:bg-pink-700 transition font-bold"
        >
          Send
        </button>
      </form>
    </main>
  </body>
</html>
