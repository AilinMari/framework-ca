<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/vite.svg" />
    <link rel="stylesheet" href="/css/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed</title>
  </head>
  <body class="bg-pink-50 min-h-screen">
    <nav
      class="bottom-0 left-0 w-full bg-white border-t border-pink-100 shadow-lg flex justify-around items-center py-4 z-50 gap-8 mb-6"
    >
      <a
        href="/index.html"
        class="relative flex flex-col items-center text-pink-600 font-semibold hover:text-pink-800 transition"
      >
        <span>Login</span>
      </a>
      <a
        href="/feed/index.html"
        class="relative flex flex-col items-center text-pink-600 font-semibold hover:text-pink-800 transition"
      >
        <span>Feed</span>
      </a>
      <a
        href="/profile/index.html"
        class="relative flex flex-col items-center text-pink-600 font-semibold hover:text-pink-800 transition"
      >
        <span>Profile</span>
      </a>
    </nav>

    <main class="bg-pink-50 flex justify-center">
      <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-sm">
        <header class="mb-4">
          <h1 class="text-3xl font-bold text-pink-600 text-center mb-6">
            Your Feed
          </h1>
          <div class="flex flex-col gap-4 mb-6">
            <input
              type="text"
              placeholder="Søk innlegg…"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-pink-500"
            />
            <select
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-pink-500 mt-1"
            >
              <option>Nyeste først</option>
              <option>Eldste først</option>
            </select>
          </div>
        </header>
        <section class="space-y-8">

          <article
            class="bg-white rounded-lg shadow hover:shadow-lg transition py-2"
          >
            <img
              src="/images/placeholder2.jpg"
              alt="Thumbnail"
              class="w-full h-40 object-cover rounded-t-lg px-3 mb-3 mt-2"
            />
            <div class="p-4">
              <h2 class="font-semibold text-lg mb-2 px-3">Post-tittel</h2>
              <p class="text-gray-600 text-sm mb-4 px-3">
                Kort beskrivelse av posten…
              </p>
              <button
                class="text-pink-600 hover:underline text-sm px-3 mb-6"
              >
                Read more
              </button>
            </div>
          </article>
          <!-- Dupliser artikkel-blokken for flere innlegg -->
        </section>
      </div>
    </main>
  </body>
</html>
